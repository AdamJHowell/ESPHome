# ESP32-2432S028R - CYD
# https://cheapyellowdisplay.co.uk/
# https://esphome.io/components/substitutions/
substitutions:
  device_name:              cyd-display
  device_name_friendly:     "CYD Display"
  mqtt_location:            "Office"
  mqtt_device:              $device_name_friendly
  api_password:             !secret cyd_api
  ota_password:             !secret cyd_ota
  broker_address:           !secret broker_address
  led_gpio:                 GPIO5
  device_ip:                192.168.55.231
  network_gateway:          192.168.55.1
  network_subnet:           255.255.255.0


# https://esphome.io/components/esphome/
esphome:
  name:          ${device_name}
  friendly_name: ${device_name_friendly}
  area:          ${mqtt_location}
  comment:       "https://cheapyellowdisplay.co.uk/config-generator"


# https://esphome.io/components/esp32/
esp32:
  board: esp32dev
  framework:
    type: arduino


# https://esphome.io/components/logger/
logger:
  #level: WARN
  !include Components/Core/logger.yaml


# https://esphome.io/components/api/
api:
  !include Components/Core/api.yaml


# https://esphome.io/components/ota/
ota:
  !include Components/Core/ota.yaml


# https://esphome.io/components/wifi/
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot in case WiFi fails
  ap:
    ssid: "CYD Fallback"
    password: "fallbackpassword"


# https://esphome.io/components/captive_portal/
captive_portal:


# Enable MQTT publishing.
# https://esphome.io/components/mqtt/
mqtt:
  !include Components/Core/mqtt.yaml


# --- TIME ---
# https://esphome.io/components/time/
time:
  - platform: homeassistant
    id: ha_time


# --- SENSORS ---
# https://esphome.io/components/sensor/
sensor:
  # Home Assistant Thermostat Temperature
  - platform: homeassistant
    id: thermostat_temperature
    entity_id: sensor.thermostat_temperature
    internal: true

  # Onboard LDR (Luminosity)
  # https://esphome.io/components/sensor/adc/
  - platform: adc
    pin: GPIO34
    name: "CYD Luminosity"
    id: luminosity
    update_interval: 1s
    attenuation: 12db
    # Auto-dimming logic
    on_value:
      then:
        - light.turn_on:
            id: display_backlight
            # The CYD LDR usually reads a lower voltage when it's bright out and higher when dark.
            # This lambda maps the raw voltage to a brightness percentage (0.1 to 1.0).
            brightness: !lambda |-
              float b = 1.0 - x; 
              if (b < 0.1) return 0.1; // Clamp to 10% so the screen never turns completely off
              if (b > 1.0) return 1.0; // Clamp to 100% max brightness
              return b;

  # https://esphome.io/components/sensor/bme680/
  - platform: bme680
    address: 0x77
    update_interval: 20s
    temperature:
      id: bme_temperature
      name: "BME680 Temperature"
      oversampling: 16x
      filters:
        - lambda: return x * ( 9.0 / 5.0 ) + 32.0;
        - offset:
            0.0
        - delta:
            max_value: 20
    pressure:
      id: bme_pressure
      name: "BME680 Pressure"
    humidity:
      id: bme_humidity
      name: "BME680 Humidity"
    gas_resistance:
      id: bme_gas_resistance
      name: "BME680 Gas Resistance"
  # https://esphome.io/components/sensor/template/
  - platform: template
    name: "BME680 Indoor Air Quality"
    id: iaq
    icon: "mdi:gauge"
    # calculation: comp_gas = log(R_gas[ohm]) + 0.04 log(Ohm)/%rh * hum[%rh]
    lambda: |-
      return log( id( bme_gas_resistance ).state ) + 0.04 *  id( bme_humidity ).state;
    state_class: "measurement"


# https://esphome.io/components/text_sensor/
text_sensor:
  # https://esphome.io/components/sensor/template/
  - platform: template
    name: "BME680 IAQ Classification"
    icon: "mdi:checkbox-marked-circle-outline"
    lambda: |-
      if (int(id(iaq).state) <= 50) {
        return {"Excellent"};
      }
      else if (int(id(iaq).state) <= 100) {
        return {"Good"};
      }
      else if (int(id(iaq).state) <= 150) {
        return {"Lightly polluted"};
      }
      else if (int(id(iaq).state) <= 200) {
        return {"Moderately polluted"};
      }
      else if (int(id(iaq).state) <= 250) {
        return {"Heavily polluted"};
      }
      else if (int(id(iaq).state) <= 350) {
        return {"Severely polluted"};
      }
      else if (int(id(iaq).state) <= 500) {
        return {"Extremely polluted"};
      }
      else {
        return {"unknown"};
      }


# --- HARDWARE BUS ---
# https://esphome.io/components/i2c/
i2c:
  - id: i2c_02
    scl: GPIO22
    sda: GPIO27

# https://esphome.io/components/spi/
spi:
  - id: tft
    clk_pin: GPIO14
    mosi_pin: GPIO13
    miso_pin:
      number: GPIO12
      ignore_strapping_warning: true
  - id: touch
    clk_pin: GPIO25
    mosi_pin: GPIO32
    miso_pin: GPIO39


# --- COLORS & FONTS ---
# https://esphome.io/components/color/
color:
  - id: color_black
    hex: "000000"
  - id: color_gray
    hex: "AAAAAA"
  - id: color_white
    hex: "FFFFFF"
  - id: color_red
    hex: "FF0000"
  - id: color_green
    hex: "00FF00"
  - id: color_blue
    hex: "0000FF"

# https://esphome.io/components/font/
font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 48
  - file: "gfonts://Roboto"
    id: font_medium
    size: 24


# --- DISPLAY ---
# https://esphome.io/components/display/
display:
  # https://esphome.io/components/display/ili9xxx/
  - platform: ili9xxx
    model: ili9341
    id: my_display
    spi_id: tft
    cs_pin: 
      number: GPIO15
      ignore_strapping_warning: true
    dc_pin:
      number: GPIO2
      ignore_strapping_warning: true
    rotation: 180
    invert_colors: false
    color_palette: 8bit
    dimensions:
      width: 320
      height: 240
    lambda: |-
      // Get the screen height to use in calculations:
      int screen_height = it.get_height();

      // Set the background to black:
      it.fill(id(color_black));

      // Time & Date:
      it.strftime(10, 10, id(font_large), id(color_gray), TextAlign::TOP_LEFT, "%H:%M", id(ha_time).now());
      it.strftime(10, 60, id(font_medium), id(color_gray), TextAlign::TOP_LEFT, "%A, %B %d", id(ha_time).now());

      // Luminosity (Raw Voltage from the ADC):
      it.printf(10, 100, id(font_medium), id(color_gray), "Luminosity: %.2f V", id(luminosity).state);

      // Thermostat temperature in Fahrenheit:
      if (id(thermostat_temperature).has_state())
      {
        it.printf(10, 140, id(font_medium), id(color_gray), "Thermostat: %.1f °F", id(thermostat_temperature).state);
      }
      else
      {
        it.print(10, 140, id(font_medium), id(color_gray), "Thermostat: -- °F");
      }

      // BME 680 Temperature in Fahrenheit:
      if ( id( bme_temperature ).has_state() )
      {
        it.printf(10, 180, id( font_medium ), id( color_gray ), "BME680 temp: %.1f °F", id( bme_temperature ).state);
      }
      else
      {
        it.print(10, 180, id( font_medium ), id( color_gray ), "BME680 temp: -- °F");
      }

      // Dynamically place the MQTT broker status text 25 pixels from the bottom of the screen:
      if (esphome::mqtt::global_mqtt_client != nullptr && esphome::mqtt::global_mqtt_client->is_connected())
      {
        it.print( 7, screen_height - 25, id( font_medium ), id( color_green ), "MQTT: Connected" );
      }
      else
      {
        it.print( 7, screen_height - 25, id( font_medium ), id( color_red ), "MQTT: Disconnected" );
      }


# --- TOUCHSCREEN ---
# https://esphome.io/components/touchscreen/
touchscreen:
  # https://esphome.io/components/touchscreen/xpt2046/
  platform: xpt2046
  id: esp_touchscreen
  spi_id: touch
  cs_pin: GPIO33
  interrupt_pin: GPIO36
  update_interval: 50ms
  threshold: 400
  calibration:
    x_min: 360
    x_max: 3860
    y_min: 280
    y_max: 3860
  transform:
    swap_xy: true
    mirror_y: true


# https://esphome.io/components/output/
output:
  # https://esphome.io/components/output/ledc/
  # --- Screen backlight ---
  - platform: ledc
    pin: GPIO21
    id: backlight_pwm
  # --- Onboard RGB red element ---
  - platform: ledc
    id: led_r
    pin: GPIO4
    inverted: true
  # --- Onboard RGB green element ---
  - platform: ledc
    id: led_g
    pin: GPIO16
    inverted: true
  # --- Onboard RGB blue element ---
  - platform: ledc
    id: led_b
    pin: GPIO17
    inverted: true


# https://esphome.io/components/light/
light:
  # https://esphome.io/components/light/monochromatic/
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: display_backlight # ID added so the LDR sensor can target it
    restore_mode: ALWAYS_ON
  # https://esphome.io/components/light/rgb/
  - platform: rgb
    name: "CYD Onboard LED"
    red: led_r
    green: led_g
    blue: led_b
